<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="google-site-verification"
      content="AoGeowPMZ8FkScgPKhIUjdHneIXJLABgV7CQpSFz0bA"
    />

    <!-- Title -->
    <title>LifeOS • a gentle productivity system</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- PWA + Mobile Support -->
    <!-- Tip: make this match your loader background to avoid white flash -->
    <meta name="theme-color" content="#f6fbf7" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="LifeOS" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Universal Boot Loader (shows before React loads) -->
    <style>
      :root {
        --bg: #f6fbf7;
        --accent-green: #cfe8d5;
        --accent-pink: #f7c9dd;
        --accent-lav: #ddd6fe;
        --text: #24322b;
        --muted: rgba(36, 50, 43, 0.6);
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        background: var(--bg);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial;
        -webkit-font-smoothing: antialiased;
      }

      /* Soft background glow */
      .boot {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        position: relative;
        overflow: hidden;
        background: radial-gradient(
          1000px 500px at 20% 0%,
          #eaf7ef 0%,
          var(--bg) 60%,
          #ffffff 100%
        );
      }

      .boot::before,
      .boot::after {
        content: "";
        position: absolute;
        inset: -20%;
        pointer-events: none;
        filter: blur(40px);
        opacity: 0.55;
        transform: translateZ(0);
      }

      /* Green glow blob */
      .boot::before {
        background: radial-gradient(
          circle at 30% 25%,
          rgba(207, 232, 213, 0.95) 0%,
          rgba(207, 232, 213, 0) 55%
        );
        animation: glowFloat1 7.5s ease-in-out infinite;
      }

      /* Pink/lav glow blob */
      .boot::after {
        background: radial-gradient(
          circle at 70% 70%,
          rgba(247, 201, 221, 0.85) 0%,
          rgba(221, 214, 254, 0.55) 22%,
          rgba(247, 201, 221, 0) 60%
        );
        animation: glowFloat2 9.5s ease-in-out infinite;
      }

      @keyframes glowFloat1 {
        0% {
          transform: translate(-2%, -1%) scale(1);
        }
        50% {
          transform: translate(2%, 1%) scale(1.05);
        }
        100% {
          transform: translate(-2%, -1%) scale(1);
        }
      }

      @keyframes glowFloat2 {
        0% {
          transform: translate(2%, 1%) scale(1.02);
        }
        50% {
          transform: translate(-2%, -1%) scale(1.07);
        }
        100% {
          transform: translate(2%, 1%) scale(1.02);
        }
      }

      .boot-card {
        width: min(420px, 92vw);
        background: rgba(255, 255, 255, 0.75);
        border: 1px solid rgba(36, 50, 43, 0.08);
        border-radius: 20px;
        padding: 24px;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
        animation: softFade 0.6s ease forwards;
        position: relative;
        z-index: 1; /* above glows */
      }

      @keyframes softFade {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Title row with tiny animated leaf */
      .boot-title {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .leaf {
        width: 18px;
        height: 18px;
        display: inline-block;
        position: relative;
        transform-origin: 60% 70%;
        animation: leafBreathe 2.2s ease-in-out infinite;
        filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.08));
      }

      /* Pure CSS leaf shape */
      .leaf::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at 30% 30%,
          rgba(255, 255, 255, 0.65) 0%,
          rgba(255, 255, 255, 0) 45%
        ),
        linear-gradient(135deg, #cfe8d5, #bfe7d1);
        border-radius: 70% 0 70% 70%;
        transform: rotate(-35deg);
        border: 1px solid rgba(36, 50, 43, 0.08);
      }

      /* tiny stem */
      .leaf::after {
        content: "";
        position: absolute;
        width: 8px;
        height: 2px;
        background: rgba(36, 50, 43, 0.18);
        bottom: 2px;
        left: 11px;
        transform: rotate(35deg);
        border-radius: 999px;
      }

      @keyframes leafBreathe {
        0% {
          transform: rotate(-2deg) scale(1);
        }
        50% {
          transform: rotate(3deg) scale(1.06);
        }
        100% {
          transform: rotate(-2deg) scale(1);
        }
      }

      .boot-logo {
        font-size: 28px;
        font-weight: 800;
        color: var(--text);
        letter-spacing: 0.2px;
      }

      .boot-sub {
        margin-top: 6px;
        font-size: 14px;
        color: var(--muted);
      }

      .boot-bar {
        margin-top: 18px;
        height: 8px;
        border-radius: 999px;
        background: rgba(36, 50, 43, 0.08);
        overflow: hidden;
      }

      .boot-bar span {
        display: block;
        height: 100%;
        width: 40%;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          var(--accent-green),
          var(--accent-pink),
          var(--accent-lav)
        );
        animation: slide 1.1s ease-in-out infinite;
      }

      @keyframes slide {
        0% {
          transform: translateX(-60%);
          opacity: 0.7;
        }
        50% {
          transform: translateX(60%);
          opacity: 1;
        }
        100% {
          transform: translateX(170%);
          opacity: 0.7;
        }
      }

      /* Rotating gentle phrases */
      .boot-note {
        position: relative;
        margin-top: 16px;
        font-size: 13px;
        color: var(--muted);
        height: 20px;
        overflow: hidden;
      }

      .phrase {
        position: absolute;
        left: 0;
        right: 0;
        opacity: 0;
        animation: rotateText 8s infinite;
      }

      .p1 {
        animation-delay: 0s;
      }
      .p2 {
        animation-delay: 2s;
      }
      .p3 {
        animation-delay: 4s;
      }
      .p4 {
        animation-delay: 6s;
      }

      @keyframes rotateText {
        0% {
          opacity: 0;
          transform: translateY(6px);
        }
        5% {
          opacity: 1;
          transform: translateY(0);
        }
        25% {
          opacity: 1;
          transform: translateY(0);
        }
        30% {
          opacity: 0;
          transform: translateY(-6px);
        }
        100% {
          opacity: 0;
        }
      }

      /* Respect reduced motion */
      @media (prefers-reduced-motion: reduce) {
        .boot-card,
        .leaf,
        .boot::before,
        .boot::after,
        .boot-bar span,
        .phrase {
          animation: none !important;
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="boot">
        <div
          class="boot-card"
          role="status"
          aria-live="polite"
          aria-label="Loading LifeOS"
        >
          <div class="boot-title">
            <span class="leaf" aria-hidden="true"></span>
            <div class="boot-logo">LifeOS</div>
          </div>

          <div class="boot-sub">gentle productivity</div>

          <div class="boot-bar" aria-hidden="true"><span></span></div>

          <div class="boot-note">
            <span class="phrase p1">Preparing your day…</span>
            <span class="phrase p2">Syncing your reflections…</span>
            <span class="phrase p3">Restoring your rhythm…</span>
            <span class="phrase p4">Gentle systems take a second…</span>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
