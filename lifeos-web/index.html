<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="google-site-verification"
      content="AoGeowPMZ8FkScgPKhIUjdHneIXJLABgV7CQpSFz0bA"
    />

    <!-- Title -->
    <title>LifeOS • a gentle productivity system</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- PWA + Mobile Support -->
    <!-- Tip: make this match your loader background to avoid white flash -->
    <meta name="theme-color" content="#f6fbf7" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="LifeOS" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Universal Boot Loader (shows before React loads) -->
    <style>
      :root {
        --bg: #f6fbf7;
        --panel: rgba(255, 255, 255, 0.78);
        --border: rgba(35, 60, 50, 0.14);
        --text: #1f2a24;
        --muted: rgba(31, 42, 36, 0.62);
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .boot {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: radial-gradient(
          1200px 600px at 20% 0%,
          #e8f6ee 0%,
          var(--bg) 55%,
          #ffffff 100%
        );
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial;
      }

      .boot-card {
        width: min(420px, 92vw);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 22px 20px;
        box-shadow: 0 12px 44px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .boot-logo {
        font-size: 28px;
        font-weight: 800;
        color: var(--text);
        letter-spacing: 0.2px;
      }

      .boot-sub {
        margin-top: 6px;
        font-size: 14px;
        color: var(--muted);
      }

      .boot-bar {
        margin-top: 16px;
        height: 10px;
        border-radius: 999px;
        background: rgba(31, 42, 36, 0.08);
        overflow: hidden;
      }

      .boot-bar span {
        display: block;
        height: 100%;
        width: 45%;
        border-radius: 999px;
        background: linear-gradient(90deg, #bff0d6, #f7c9dd, #c7d2fe);
        animation: bootmove 1.05s ease-in-out infinite;
      }

      @keyframes bootmove {
        0% {
          transform: translateX(-60%);
          opacity: 0.7;
        }
        50% {
          transform: translateX(60%);
          opacity: 1;
        }
        100% {
          transform: translateX(170%);
          opacity: 0.7;
        }
      }

      .boot-note {
        margin-top: 14px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="boot">
        <div
          class="boot-card"
          role="status"
          aria-live="polite"
          aria-label="Loading LifeOS"
        >
          <div class="boot-logo">LifeOS</div>
          <div class="boot-sub">gentle productivity</div>

          <div class="boot-bar" aria-hidden="true"><span></span></div>

          <div class="boot-note">Loading your space…</div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
